<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact EarnProof | Help & Support</title>
  <link rel="icon" type="image/png" href="favicon.png">
  
  <meta name="description" content="Contact EarnProof for questions, feedback, or corrections. Help us improve our earning guides for Pakistan.">
  
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Contact EarnProof | Help & Support">
  <meta property="og:description" content="Contact EarnProof for questions, feedback, or corrections.">
  <meta property="og:url"         content="https://earnproof.github.io/contact.html">
  <meta property="og:image"       content="https://earnproof.github.io/Image.png">
  <meta property="og:site_name"   content="EarnProof">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --border: #262d42;
      --text: #e8eaf0;
      --muted: #8b92a8;
      --green: #22c55e;
      --accent: #60a5fa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    
    .brand { font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 700; color: var(--text); text-decoration: none; }
    .brand span { color: var(--green); }
    
    .back-link { color: var(--muted); font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
    .back-link:hover { color: var(--text); }

    .content-wrap { 
      flex: 1;
      max-width: 600px; 
      margin: 0 auto; 
      padding: 5rem 1.5rem; 
      text-align: center; 
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent);
      background: #3b82f615; border: 1px solid #3b82f633;
      padding: 4px 12px; border-radius: 99px; margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 1rem;
    }

    .sub-text {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem;
      border-radius: 24px;
      transition: border-color 0.3s;
    }
    
    .contact-card:hover {
      border-color: var(--accent);
    }

    .email-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.5rem;
      display: block;
    }

    .email-address {
      font-family: 'IBM Plex Sans', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: underline;
      word-break: break-all;
    }

    .support-note {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .status-dot {
      width: 8px; height: 8px; background: var(--green); border-radius: 50%;
      box-shadow: 0 0 10px var(--green);
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      .email-address { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<nav dir="ltr">
  <a href="index.html" class="brand">EarnProof<span>.</span></a>
  <a href="index.html" class="back-link">← Wapas</a>
</nav>

<div class="content-wrap">
  <div class="eyebrow">Help & Support</div>
  <h1>Ask Anything<span>.</span></h1>
  <p class="sub-text">Agar aapko kisi app ke baare mein poochna hai ya scam report karna hai, to hamein email karein.</p>

  <div class="contact-card">
    <span class="email-label">Email Us At:</span>
    <a href="mailto:admin@earnproof.io" class="email-address">admin@earnproof.io</a>
    
    <div class="support-note">
      <div class="status-dot"></div>
      Active Support (24-48h Response Time)
    </div>
  </div>
</div>

<footer>
  <p>© 2026 EarnProof — Pakistan's Trusted Earning Guide</p>
</footer>

</body>
</html>
